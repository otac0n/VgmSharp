name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  native-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libmpg123-dev libvorbis-dev libspeex-dev
      - name: Build libvgmstream.so
        run: chmod +x native/build-linux.sh && native/build-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native/libvgmstream.so

  native-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build vgmstream.dll
        shell: pwsh
        run: native/build-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native/vgmstream.dll

  pack:
    needs: [native-linux, native-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: runtimes/linux-x64/native
      - uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: runtimes/win-x64/native
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build & test
        run: |
          dotnet build src/VgmSharp/VgmSharp.csproj -c Release
          dotnet build samples/DecodeToWav/DecodeToWav.csproj -c Release
      - name: Pack
        run: dotnet pack src/VgmSharp/VgmSharp.csproj -c Release -o ./artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: artifacts/*.nupkg
